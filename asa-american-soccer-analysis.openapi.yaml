  /{league}/players/xgoals:
    get:
      tags:
      - Player stats
      summary: Per-player expected-goals + attacking production.
      description: 'Returns a flat JSON array of `PlayerXgoals`. Availability: all 5 leagues.'
      parameters:
      - name: league
        in: path
        required: true
        description: 'League slug. Route published for: all 5 leagues.'
        schema:
          type: string
          enum: *id001
      - name: season_name
        in: query
        required: false
        description: Filter to one or more seasons. Comma-list accepted (`2022,2023`).
        schema:
          type: string
      - name: stage_name
        in: query
        required: false
        description: Filter to a competition stage, e.g. `Regular Season`. **URL-encode spaces.**
        schema:
          type: string
      - name: minimum_minutes
        in: query
        required: false
        description: Drop players/teams below this minutes-played threshold.
        schema:
          type: string
      - name: general_position
        in: query
        required: false
        description: 'Filter by general position code: GK, CB, FB, DM, CM, AM, W, ST (player/GK routes).'
        schema:
          type: string
      - name: split_by_teams
        in: query
        required: false
        description: '`true` => one row per entity per team (splits traded players).'
        schema:
          type: string
      - name: split_by_seasons
        in: query
        required: false
        description: '`true` => one row per entity per season.'
        schema:
          type: string
      - name: split_by_games
        in: query
        required: false
        description: '`true` => one row per entity per game.'
        schema:
          type: string
      - name: start_date
        in: query
        required: false
        description: Lower date bound (`YYYY-MM-DD`), where the route supports date windows.
        schema:
          type: string
      - name: end_date
        in: query
        required: false
        description: Upper date bound (`YYYY-MM-DD`), where the route supports date windows.
        schema:
          type: string
      responses:
        '200':
          description: Flat array of matching rows (no envelope, no pagination).
          content:
            application/json:
