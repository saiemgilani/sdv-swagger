openapi: 3.1.0
info:
  title: American Soccer Analysis (ASA) public API
  description: 'The **American Soccer Analysis** public data API on host `app.americansocceranalysis.com/api/v1/{league}/*`
    — plain HTTPS GET, JSON, **no auth** (a normal User-Agent is fine). This is the API wrapped by the
    `itscalledsoccer` R/Python client. Every route returns a **flat top-level JSON array** (no envelope,
    no pagination metadata). IDs are short base62 strings => treat as `Utf8` join keys, never numeric.
    The `goals-added` routes nest a per-action-type `data[]` breakdown. Five live leagues: mls, nwsl,
    uslc, usl1, mlsnp (per-route availability is on each operation''s `x-leagues`). Schemas here are unioned
    from real captures under `asa/captures/{league}/`.'
  version: asa-2026-07-18
servers:
- url: https://app.americansocceranalysis.com/api/v1
tags:
- name: Entities
- name: Player stats
- name: Team stats
- name: Goalkeeper stats
- name: Game stats
paths:
  /{league}/teams:
    get:
      tags:
      - Entities
      summary: Teams in the league (full table, no filter params).
      description: 'Returns a flat JSON array of `Team`. Availability: all 5 leagues.'
      parameters:
      - name: league
        in: path
        required: true
        description: 'League slug. Route published for: all 5 leagues.'
        schema:
          type: string
          enum: &id001
          - mls
          - nwsl
          - uslc
          - usl1
          - mlsnp
      responses:
        '200':
          description: Flat array of matching rows (no envelope, no pagination).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
      x-example-url: https://app.americansocceranalysis.com/api/v1/mls/teams
      x-leagues: all 5 leagues
  /{league}/players:
    get:
      tags:
      - Entities
      summary: Players in the league (identity + biometrics + positions).
      description: 'Returns a flat JSON array of `Player`. Availability: all 5 leagues.'
      parameters:
      - name: league
        in: path
        required: true
        description: 'League slug. Route published for: all 5 leagues.'
        schema:
          type: string
          enum: *id001
      responses:
        '200':
          description: Flat array of matching rows (no envelope, no pagination).
          content:
            application/json:
              schema:
                type: array
