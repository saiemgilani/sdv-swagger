              "eligible_season": { type: number }
              "grades_tackle": { type: number }
              "yards": { type: number }
              "receptions": { type: number }
              "forced_incompletion_rate": { type: string, nullable: true }
              "grades_coverage_defense": { type: number }
              "interceptions": { type: number }
              "snap_counts_coverage": { type: number }
              "grades_run_defense": { type: number }
              "snap_counts_pass_play": { type: number }
              "penalties": { type: number }
              "forced_incompletes": { type: number }
              "team": { type: string }
