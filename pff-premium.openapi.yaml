openapi: 3.1.0
info:
  title: PFF Premium Stats API (unofficial, reverse-engineered)
  version: "0.1.0-re.2026-07-08"
  description: >
    Reverse-engineered map of https://premium.pff.com/api/v1/ observed via authenticated
    browser traffic + the frontend JS route table. NOT an official PFF spec. Auth is by
    session COOKIE (no Authorization header): Clerk '__session' JWT (~60s TTL, silently
    refreshed by the Clerk '__refresh_*'/'__client_uat' cookies) plus the Phoenix-signed
    '_premium_key' cookie carrying the premium entitlement (permissions.premium=[full]).
    Every stat endpoint is {prefix}{report} where prefix selects the view:
    facet=leaderboard/team/game, player=player-detail.
servers:
  - url: https://premium.pff.com
security:
  - clerkSession: []
    premiumKey: []
components:
  securitySchemes:
    clerkSession: { type: apiKey, in: cookie, name: __session }
    premiumKey:   { type: apiKey, in: cookie, name: _premium_key }
  parameters:
    league:     { name: league,   in: query, required: true,  schema: { type: string, enum: [nfl, ncaa, aaf, ufl] } }
    season:     { name: season,   in: query, required: true,  schema: { type: integer }, description: "e.g. nfl 1994-2025, ncaa 2008-2025" }
    week:       { name: week,     in: query, required: true,  schema: { type: string }, description: "comma-separated week IDs, e.g. 1,2,...,18,28,29,30,32 (post-season weeks are 28-32)" }
    weekSingle: { name: week,     in: query, required: false, schema: { type: integer }, description: "single week id (games endpoint)" }
    playerId:   { name: player_id, in: query, required: true, schema: { type: integer } }
    franchiseId: { name: franchiseId, in: query, required: false, schema: { type: integer }, description: "team filter on facet reports (By Team view)" }
    gameId:     { name: gameId,   in: query, required: false, schema: { type: integer }, description: "game filter on facet reports (By Game view); requires league+season" }
    division:   { name: division, in: query, required: false, schema: { type: string }, description: "ncaa conference/division filter (comma-separated)" }
    career:     { name: career,   in: query, required: false, schema: { type: boolean }, description: "player-detail: career totals instead of a single season" }
    name:       { name: name,     in: query, required: false, schema: { type: string }, description: "player search by name" }
    id:         { name: id,       in: query, required: false, schema: { type: integer }, description: "player lookup by id" }
