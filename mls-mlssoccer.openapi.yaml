info:
  description: 'Reverse-engineered reference for the current official MLS web API (re-platformed onto
    Sportec Solutions). Three no-auth hosts; send header `Referer: https://www.mlssoccer.com/`. Deep match
    stats / play-by-play are NOT served here (StatsPerform Touchline widget renders those). Derived from
    real captures 2026-07-18; changes without notice.'
  title: MLS (Sportec Solutions) web API
  version: 2026.07.18
openapi: 3.1.0
paths:
  /api/clubs/bySportecIds/{ids}:
    get:
      parameters:
      - description: Comma-separated Sportec club ids (MLS-CLU-*)
        example: MLS-CLU-000001,MLS-CLU-000002
        in: path
        name: ids
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SportApiClub'
                type: array
          description: Batch club detail by Sportec ids (sportapi).
      summary: Batch club detail by Sportec ids (sportapi).
      tags:
      - sportapi
  /api/matches/bySportecIds/{ids}:
    get:
      parameters:
      - description: Comma-separated Sportec match ids (MLS-MAT-*)
        example: MLS-MAT-0009H8,MLS-MAT-0009H9
        in: path
        name: ids
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SportApiMatch'
                type: array
          description: Batch match detail by Sportec ids (sportapi).
      summary: Batch match detail by Sportec ids (sportapi).
      tags:
      - sportapi
  /api/matches/{matchId}:
    get:
      description: Host sportapi.mlssoccer.com. Broadcast/venue/branding-rich match shape (distinct from
        the stats-api match).
      parameters:
      - description: Sportec match id (MLS-MAT-*) or Opta numeric id
        example: MLS-MAT-0009H8
        in: path
        name: matchId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportApiMatch'
          description: Single match detail (sportapi / .NET).
      summary: Single match detail (sportapi / .NET).
      tags:
      - sportapi
  /api/players/byClub/{clubId}:
    get:
      parameters:
      - description: Opta or Sportec club id
        example: '11690'
        in: path
        name: clubId
        required: true
        schema:
          type: string
      - description: Locale, e.g. en-us
        example: en-us
        in: query
        name: culture
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RosterPlayer'
                type: array
          description: Club roster with player Sportec ids (sportapi).
      summary: Club roster with player Sportec ids (sportapi).
      tags:
      - sportapi
  /clubs/{clubId}:
    get:
      parameters:
      - description: Sportec club id (MLS-CLU-*)
        example: MLS-CLU-000001
        in: path
        name: clubId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsClub'
          description: Single club detail (stats-api).
      summary: Single club detail (stats-api).
      tags:
      - stats-api
  /competitions:
    get:
      description: Host stats-api.mlssoccer.com. Response envelope `{competitions:[...], next_page_token}`.
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Competition'
                type: array
          description: List competitions (stats-api).
      summary: List competitions (stats-api).
      tags:
      - stats-api
  /competitions/{competitionId}/seasons:
    get:
      description: Response envelope `{seasons:[...]}`.
      parameters:
      - description: Sportec competition id (MLS-COM-*)
        example: MLS-COM-000001
        in: path
        name: competitionId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Season'
                type: array
          description: List seasons for a competition (stats-api).
      summary: List seasons for a competition (stats-api).
      tags:
      - stats-api
  /competitions/{competitionId}/seasons/{seasonId}/standings:
    get:
      description: Response envelope `{tables:[...]}`; each table has an `entries[]` array of team rows.
      parameters:
      - description: Sportec competition id
        example: MLS-COM-000001
        in: path
        name: competitionId
        required: true
        schema:
          type: string
      - description: Sportec season id (MLS-SEA-*)
        example: MLS-SEA-0001KA
        in: path
        name: seasonId
        required: true
        schema:
          type: string
      - description: 'Standings grouping: conference | overall'
        example: conference
        in: query
        name: category
        required: false
        schema:
          type: string
      - description: home | away split (optional)
        in: query
        name: type
        required: false
        schema:
          type: string
      - description: Include live in-progress results
        in: query
        name: is_live
        required: false
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/StandingsTable'
                type: array
          description: Standings table for a competition season (stats-api).
      summary: Standings table for a competition season (stats-api).
      tags:
      - stats-api
  /matches/seasons/{seasonId}:
    get:
      description: Response envelope `{schedule:[...]}`.
      parameters:
      - description: Sportec season id (MLS-SEA-*)
        example: MLS-SEA-0001KA
        in: path
        name: seasonId
        required: true
        schema:
          type: string
      - description: Window start date (YYYY-MM-DD)
        example: '2026-07-01'
        in: query
        name: match_date[gte]
        required: false
        schema:
          type: string
      - description: Window end date (YYYY-MM-DD)
        example: '2026-07-31'
        in: query
        name: match_date[lte]
        required: false
        schema:
          type: string
      - description: Filter by competition id
        example: MLS-COM-000001
        in: query
        name: competition_id
        required: false
        schema:
          type: string
      - description: Page size
        in: query
        name: per_page
        required: false
        schema:
          type: integer
      - description: Sort spec, e.g. planned_kickoff_time:asc,home_team_name:asc
        in: query
        name: sort
        required: false
        schema:
          type: string
      - description: Filter by series/round name
        in: query
        name: series_name
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MatchListRow'
                type: array
          description: List matches in a season, date-windowed (stats-api).
      summary: List matches in a season, date-windowed (stats-api).
      tags:
      - stats-api
  /matches/{matchId}:
    get:
      description: 200 for PLAYED matches; **404 for unplayed / future matches**. Carries `home.players[]`
        / `away.players[]` lineups and `referees[]`.
      parameters:
      - description: Sportec match id (MLS-MAT-*)
        example: MLS-MAT-0009H8
        in: path
        name: matchId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'
          description: Single match detail incl. lineups + referees (stats-api).
      summary: Single match detail incl. lineups + referees (stats-api).
      tags:
      - stats-api
  /v2/content/en-us/seasons:
    get:
      description: Only **indexed** fields work as query filters; an un-indexed filter returns `{error:{message:'only
        indexed fields can be used as query filters'}}`. Envelope `{pagination, meta, items}`.
      parameters:
      - description: Filter by competition Sportec id (indexed field)
        example: MLS-COM-000001
        in: query
        name: fields.competitionSportecId
        required: false
        schema:
          type: string
      - description: Filter by season Sportec id (indexed field)
        example: MLS-SEA-0001KA
        in: query
        name: fields.sportecId
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonQueryResult'
          description: Query season content entities (dapi / Contentful).
      summary: Query season content entities (dapi / Contentful).
      tags:
      - dapi
  /v2/content/en-us/seasons/{slug}:
    get:
      parameters:
      - description: Season content slug
        example: mls-regular-season-2026
        in: path
        name: slug
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonContent'
          description: Season content entity by slug (dapi / Contentful).
      summary: Season content entity by slug (dapi / Contentful).
      tags:
      - dapi
servers:
- description: 'stats-api: AWS API Gateway, Sportec-backed (cache-control: no-store)'
  url: https://stats-api.mlssoccer.com
- description: 'sportapi: .NET / miniprofiler match+club+roster'
  url: https://sportapi.mlssoccer.com
- description: 'dapi: Contentful content API (season content)'
  url: https://dapi.mlssoccer.com
tags:
- description: https://stats-api.mlssoccer.com — competitions, seasons, standings, matches, clubs
  name: stats-api
- description: https://sportapi.mlssoccer.com — match/club batch lookups + club rosters
  name: sportapi
- description: https://dapi.mlssoccer.com — Contentful season content
  name: dapi
