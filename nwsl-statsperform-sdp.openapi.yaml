        shortName:
          type: string
        officialName:
          type: string
        acronymName:
          type: string
        acronymNameLocalized:
          type: string
        isTeamFake:
          type: boolean
        mediaName:
          type: string
        mediaShortName:
          type: string
        countryCode:
          type: string
        teamType:
          type: string
        overallSummary:
          type: string
        stadium:
          type: object
        imagery:
          type: object
          description: Object of CDN image URLs (crest/badge/photo variants).
        allSeasonImagery:
          type: array
          items: {}
        editorial:
          type: object
      additionalProperties: true
    MatchDay:
      type: object
      properties:
        matchSetId:
          type: string
        providerId:
          type: string
          description: Underlying StatsPerform/Opta provider id (e.g. `opta:...`).
        name:
          type: string
        seasonId:
          type: string
          description: Composite Season id (Utf8 join key).
        competitionId:
          type: string
          description: Composite Competition id (Utf8 join key).
        roundId:
          type: 'null'
        stageId:
          type: string
        index:
          type: 'null'
        shortName:
          type: string
        matchSetFormatId:
          type: 'null'
        type:
          type: 'null'
        startDateUtc:
          type: string
        endDateUtc:
          type: string
        matchdayStatus:
          type: string
      additionalProperties: true
    Match:
      type: object
      properties:
        providerId:
          type: string
          description: Underlying StatsPerform/Opta provider id (e.g. `opta:...`).
        seasonId:
          type: string
