      summary: Fielding run value (HTML-embedded JSON)
      description: |
        Unlike the CSV leaderboards, this endpoint returns `text/html` even when
        `csv=true` is sent. The leaderboard rows are embedded in the page as a
        `<script> const data = [ ... ]` JSON blob; parse that blob rather than
        expecting CSV. Covers fielding run value across positions.
      parameters:
        - { name: type, in: query, schema: { type: string } }
        - { name: year, in: query, schema: { type: string } }
        - { name: team, in: query, schema: { type: string } }
        - { name: min, in: query, schema: { type: string } }
      responses:
        '200':
          description: HTML page with the leaderboard data embedded in a `<script> const data = [...]` JSON blob (not CSV).
          content:
            text/html: {}

