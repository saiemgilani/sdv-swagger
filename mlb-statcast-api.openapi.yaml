  # ───────────────────────── Game feed ─────────────────────────
  /gf:
    get:
      tags: [gamefeed]
      summary: Savant per-game JSON feed
      description: |
        JSON payload powering the in-game viz at `baseballsavant.mlb.com/gamefeed`.
        Includes Statcast tracking events and inning-by-inning structure.
      parameters:
        - { name: game_pk, in: query, required: true, schema: { type: integer } }
        - { name: at_bat_number, in: query, schema: { type: integer } }
      responses:
        '200':
          description: JSON game feed.
          content:
            application/json: {}

  /schedule:
    get:
      tags: [gamefeed]
      summary: Savant schedule / win-probability feed
      description: |
        JSON payload powering the Savant schedule + scoreboard views. Returns an
        object with `wpa` (per-game win-probability series) and `schedule` (the
        day's games). Pass `date` to scope to a single day; omit it for the
        default (today).
      parameters:
        - { name: date, in: query, schema: { type: string, format: date }, description: "Schedule date (YYYY-MM-DD). Defaults to today when omitted." }
      responses:
        '200':
          description: JSON object with `wpa` and `schedule` keys.
          content:
            application/json: {}

  # ───────────────────────── Player pages ─────────────────────────
  /savant-player/{playerId}:
    get:
      tags: [player]
      summary: Savant player profile page (HTML, with embedded JSON)
      description: |
        Returns an HTML page. The page embeds a large JSON blob in a `<script>`
        tag — easiest scrape target for per-player Statcast summaries. Pass
        `?stats=statcast-r-hitting-mlb` (or similar) to control the default tab.
      parameters:
        - { name: playerId, in: path, required: true, schema: { type: integer }, description: MLBAM ID }
        - { name: stats, in: query, schema: { type: string } }
      responses:
        '200':
          description: HTML.
          content:
            text/html: {}
