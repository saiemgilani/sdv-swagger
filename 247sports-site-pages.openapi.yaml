openapi: 3.0.1
info:
  title: 247Sports Site Pages (front-end page-JSON)
  description: 'The 247Sports **front-end page-model JSON surface** on host `247sports.com` (distinct
    from the `ipa.247sports.com/rdb/v1` Recruit Database). Any site route with a `.json` suffix returns
    the page''s underlying model. **Auth-free** (no guest JWT), but behind the same Fastly edge that TLS-fingerprint-blocks
    plain `requests` — call with curl / curl_cffi `impersonate="chrome"`. Payloads are flat: nested entities
    are bare integer foreign keys, so you traverse the graph by following each entity''s `.json` sub-routes.
    Schemas here are derived from real captures under `captures/site-pages/`.'
  version: site-2026-07-08
servers:
- url: https://247sports.com
tags:
- name: Recruits
- name: Institution
- name: Player
- name: PlayerInstitution
- name: PlayerSport
- name: Position
- name: News
- name: Coach
- name: Predictions
- name: Event
- name: RecruitInterest
- name: Recruitment
- name: Roster
- name: Evaluation
- name: Draft
paths:
  /Season/{season}/Recruits.json:
    get:
      tags:
      - Recruits
      summary: Recruit class rankings for a season (rich per-recruit rows with inlined Player).
      parameters:
      - name: season
        in: path
        description: '`{year}-{Sport}`, e.g. `2026-Football`.'
        schema:
          type: string
        required: true
      - name: Items
        in: query
        description: Page size.
        schema:
          type: integer
      - name: Page
        in: query
        description: 1-based page number.
        schema:
          type: integer
      - name: Player.FullName
        in: query
        description: Filter by player full name (URL-encoded).
        schema:
          type: string
      - name: Institution
        in: query
        description: Filter by committed institution key.
        schema:
          type: integer
      responses:
        '200':
          description: Matching entities.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recruit'
      x-example-url: https://247sports.com/Season/2026-Football/Recruits.json?Items=15&Page=1
  /Institution/{key}.json:
    get:
      tags:
