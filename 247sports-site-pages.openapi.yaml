components:
  schemas:
    Institution:
      type: object
      properties:
        Key:
          type: integer
          description: Primary key of this entity (the id used in its `.json` route).
        Name:
          type: string
        Type:
          type: string
          description: Institution type code (college / pro / high school).
        Group:
          type: string
          description: Institution group (division/level) bitmask code.
        Location:
          type: integer
          description: FK -> Location (`/Institution/{Location}/Location.json`).
        State:
          type: integer
          description: FK -> State entity.
        Latitude:
          type: string
        Longitude:
          type: string
        Rankable:
          type: string
          description: Whether the institution participates in class rankings.
        Mascot:
          type: string
          nullable: true
        Abbreviation:
          type: string
          nullable: true
        PrimaryColor:
          type: string
          nullable: true
        SecondaryColor:
          type: string
          nullable: true
        IsForeign:
          type: string
        Site:
          type: integer
          nullable: true
          description: FK -> team Site (network site key).
        DefaultAsset:
          type: integer
          nullable: true
        AlternateAsset:
          type: integer
          nullable: true
        LightAsset:
          type: integer
          nullable: true
        DefaultName:
          type: string
          description: Server-rendered display label for the entity.
        Address:
          type: string
          nullable: true
        Telephone:
          type: string
          nullable: true
      additionalProperties: false
    Location:
      type: object
      properties:
        Key:
          type: integer
          description: Primary key of this entity (the id used in its `.json` route).
        PostalCode:
          type: string
        City:
          type: string
        State:
          type: integer
        Latitude:
          type: string
        Longitude:
          type: string
        CountyTaxRate:
          type: string
        CityTaxRate:
          type: string
        SpecialTaxRate:
          type: string
        RegionName:
          type: string
        DefaultName:
          type: string
          description: Server-rendered display label for the entity.
      additionalProperties: false
    Player:
      type: object
      properties:
        Key:
          type: integer
          description: Primary key of this entity (the id used in its `.json` route).
        Hometown:
          type: object
          nullable: true
          description: Inline hometown stub (State FK + City).
          properties:
            State:
              type: integer
            City:
              type: string
        FirstName:
          type: string
        LastName:
          type: string
        FullName:
          type: string
        Height:
          type: string
        Weight:
          type: number
        Bio:
          type: string
        ScoutEvaluation:
          type: string
        Birthdate:
          type: string
          nullable: true
        ModifiedUser:
          type: string
          nullable: true
        ModifiedDate:
          type: string
        CBSKey:
          type: integer
          description: Cross-reference key into the CBS Sports id space.
        Url:
          type: string
        PlayerHighSchool:
          type: object
          nullable: true
          description: Inline high-school stub (Name).
          properties:
            Name:
              type: string
        LastRecruitmentPlayerInstitution:
          type: integer
        CurrentPlayerInstitution:
          type: integer
          description: FK -> PlayerInstitution (current school).
        TwitterContact:
          type: integer
          nullable: true
        MobilePhoneContact:
          type: string
          nullable: true
        PrimaryPlayerSport:
          type: integer
          description: FK -> PlayerSport (`/PlayerSport/{id}.json`).
        PrimaryPlayerPosition:
          type: object
          nullable: true
          description: Inline position stub (Abbreviation).
          properties:
            Abbreviation:
              type: string
        PrimaryRecruitment:
          type: integer
          nullable: true
        DefaultName:
          type: string
          description: Server-rendered display label for the entity.
        DefaultAsset:
          type: integer
        DefaultAssetUrl:
          type: string
        HeroAsset:
          type: string
          nullable: true
        QuoteAsset:
