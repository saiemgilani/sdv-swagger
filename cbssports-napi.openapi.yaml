openapi: 3.1.0
info:
  title: CBS Sports NAPI (unofficial)
  version: 1.0.0-rev2026.06
  description: 'Reverse-engineered OpenAPI 3.1 description of the CBS Sports **NAPI** REST API (`api.cbssports.com/napi`).
    Generated from the API''s own endpoint registry (`/resource/endpoint/registry`) + captured response
    bodies. Auth-free for the data-backed resources (leagues, seasons, teams, rosters, standings). Live
    per-game scoring and recruiting are documented but routed elsewhere (torq realtime feed / recruit-specific
    ids) and are not anonymously reachable. NOT an official or supported API; subject to change.

    '
  x-napi-schema-source: endpoint-registry + captured bodies (2026-06)
servers:
- url: https://api.cbssports.com/napi
  description: primary
- url: https://sdf-api.cbssports.cloud/napi
  description: cloud mirror
