openapi: 3.1.0
info:
  title: Yahoo Sports Editorial API (unofficial)
  version: 0.1.0-rev2026.06
  summary: Reverse-engineered spec for Yahoo's editorial scoreboard/boxscore feed.
  description: 'api-secure.sports.yahoo.com/v1/editorial/s is a game/event feed. No auth; send Origin:
    https://sports.yahoo.com + Referer. Schemas inferred from captured NCAAF bodies (yahoo/discovery/responses/).
    Shapes are league-agnostic. NOT an official API.

    '
  x-yahoo-schema-source: captured-2026-06
  contact:
    name: sdv-internal-refs
  license:
    name: Reference only
servers:
- url: https://api-secure.sports.yahoo.com
  description: Yahoo Sports editorial host
tags:
- name: editorial
  description: Game/event editorial feed.
paths:
  /v1/editorial/s/boxscore/{gameId}:
    get:
      operationId: getEditorial_boxscore
      summary: Full game box score + play-by-play (normalized stat dictionaries)
      tags:
      - editorial
      parameters:
      - $ref: '#/components/parameters/gameId'
      - $ref: '#/components/parameters/lang'
      - $ref: '#/components/parameters/region'
      - $ref: '#/components/parameters/tz'
      - name: v
        in: query
        required: false
        schema:
          type: integer
          default: 4
      - name: polling
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoxscoreResponse'
      description: 'service.boxscore: player_stats[playerId][variation][stat_type]=value, decode via stat_types/stat_categories;
        gameplay_by_play[gameId][period].'
  /v1/editorial/s/scoreboard:
    get:
      operationId: getEditorial_scoreboard
      summary: 'Scoreboard: games + teams + leagues + odds (fat payload)'
      tags:
      - editorial
      parameters:
      - $ref: '#/components/parameters/lang'
      - $ref: '#/components/parameters/region'
      - $ref: '#/components/parameters/tz'
      - name: leagues
        in: query
        required: true
        schema:
          type: string
      - name: week
        in: query
        required: false
        schema:
          type: integer
      - name: season
        in: query
        required: false
        schema:
          type: integer
      - name: conferences
        in: query
        required: false
        schema:
          type: string
      - name: count
        in: query
        required: false
        schema:
          type: integer
          default: 500
      - name: v
        in: query
        required: false
        schema:
          type: integer
          default: 2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreboardResponse'
      description: 'service.scoreboard maps keyed by entity id: games (ncaaf.g.*), teams (ncaaf.t.*, full
        metadata), leagues, divisions, gameodds, teamrankings (ncaaf.poll.*), gametv_details.'
components:
  parameters:
    lang:
      name: lang
      in: query
      required: false
      schema:
        type: string
        default: en-US
    region:
      name: region
      in: query
      required: false
      schema:
        type: string
        default: US
    tz:
      name: tz
      in: query
      required: false
      schema:
        type: string
        default: America/Chicago
    gameId:
      name: gameId
      in: path
      required: true
      description: Dotted game id, e.g. ncaaf.g.202509200023.
      schema:
        type: string
  schemas:
