openapi: 3.1.0
info:
  title: ESPN Web v3 API (unofficial)
  version: 1.0.0-rev2026.06
  description: 'site.web.api.espn.com is the richest source of athlete data: overview, season stats, game
    logs, splits, and the cross-athlete statistical leaderboard. Stats endpoints use parallel-array shapes
    (labels[]/names[]/totals[], categories[]) with a glossary[] of {abbreviation, displayName, description}.
    Schemas are derived from documented representative responses.

    '
  summary: Reverse-engineered OpenAPI spec for ESPN's Web common v3 host.
  x-espn-schema-source: documentation
servers:
- url: https://site.web.api.espn.com
  description: ESPN Web common v3 (richest athlete data)
tags:
- name: web-v3
  description: site.web.api.espn.com /apis/common/v3 athlete endpoints + search
