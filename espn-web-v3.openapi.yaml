      - name: athleteId
        in: path
        required: true
        schema:
          type: string
        description: athleteId path parameter.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statistics:
                    type: object
                    properties:
                      labels:
                        type: array
                        items:
                          type: string
                      names:
                        type: array
