  /apis/common/v3/sports/{sport}/{league}/athletes/{athleteId}/stats:
    get:
      operationId: get_web_v3_apis_common_v3_sports_sport_league_athletes_athleteId_stats
      summary: Athlete season stats (parallel-array categories with glossary)
      parameters:
      - *id001
      - *id002
      - name: athleteId
        in: path
        required: true
        schema:
          type: string
        description: athleteId path parameter.
      - name: season
        in: query
        required: false
        schema:
          type: integer
        description: Season year.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  filters:
                    type: array
                    items:
                      type: object
                      properties:
                        displayName:
                          type: string
                        name:
                          type: string
                        value:
                          type: string
                        options:
                          type: array
                          items:
                            type: object
                            properties:
                              value:
                                type: string
                              displayValue:
                                type: string
                  teams:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        uid:
                          type: string
                        displayName:
                          type: string
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        displayName:
                          type: string
                        labels:
                          type: array
                          items:
                            type: string
                        totals:
                          type: array
                          items:
                            type: string
                  glossary:
                    type: array
                    items:
                      type: object
                      properties:
                        abbreviation:
                          type: string
                        displayName:
                          type: string
                        description:
                          type: string
  /apis/common/v3/sports/{sport}/{league}/athletes/{athleteId}/gamelog:
    get:
      operationId: get_web_v3_apis_common_v3_sports_sport_league_athletes_athleteId_gamelog
      summary: Athlete game-by-game log
      parameters:
      - *id001
      - *id002
      - name: athleteId
        in: path
        required: true
        schema:
          type: string
        description: athleteId path parameter.
      - name: season
        in: query
        required: false
        schema:
          type: integer
        description: Season year.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  filters:
                    type: array
                    items:
                      type: object
                      properties:
                        displayName:
                          type: string
                        name:
                          type: string
                        value:
                          type: string
                  labels:
                    type: array
                    items:
                      type: string
                  names:
                    type: array
                    items:
                      type: string
                  displayNames:
                    type: array
                    items:
                      type: string
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        date:
                          type: string
                        opponent:
                          type: object
                          properties:
                            id:
                              type: string
                            displayName:
                              type: string
                            abbreviation:
                              type: string
                        gameResult:
                          type: string
                        stats:
                          type: array
                          items:
                            type: string
  /apis/common/v3/sports/{sport}/{league}/athletes/{athleteId}/splits:
    get:
      operationId: get_web_v3_apis_common_v3_sports_sport_league_athletes_athleteId_splits
      summary: Athlete statistical splits
      parameters:
      - *id001
      - *id002
      - name: athleteId
        in: path
        required: true
        schema:
          type: string
        description: athleteId path parameter.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  filters:
                    type: array
                    items:
                      type: object
                      properties:
                        displayName:
                          type: string
                        name:
                          type: string
                  displayName:
                    type: string
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        displayName:
                          type: string
                        labels:
                          type: array
                          items:
                            type: string
                        totals:
                          type: array
                          items:
                            type: string
  /apis/common/v3/sports/{sport}/{league}/statistics/byathlete:
    get:
      operationId: get_web_v3_apis_common_v3_sports_sport_league_statistics_byathlete
      summary: Statistical leaderboard across all athletes
      parameters:
      - *id001
      - *id002
      - name: category
        in: query
        required: false
        schema:
          type: string
        description: Stat category (e.g. batting, scoring).
      - name: sort
        in: query
        required: false
        schema:
          type: string
        description: Sort expression e.g. batting.homeRuns:desc.
      - name: season
        in: query
        required: false
        schema:
          type: integer
        description: Season year.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      count:
                        type: integer
                      limit:
                        type: integer
                      page:
                        type: integer
                      pages:
                        type: integer
                  league:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  currentSeason:
                    type: object
                    properties:
                      year:
                        type: integer
                      type:
                        type: integer
                  athletes:
                    type: array
                    items:
                      type: object
                      properties:
                        athlete:
                          type: object
                          properties:
                            id:
                              type: string
                            displayName:
                              type: string
                            team:
                              type: object
                              properties:
                                id:
                                  type: string
                                abbreviation:
                                  type: string
                            position:
                              type: object
                              properties:
                                abbreviation:
                                  type: string
                        statistics:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              displayValue:
                                type: string
                              rank:
                                type: integer
  /apis/common/v3/sports/{sport}/{league}/leaders:
    get:
      operationId: get_web_v3_apis_common_v3_sports_sport_league_leaders
      summary: Stat leaders (web-v3 leaderboard with glossary)
      parameters:
      - *id001
      - *id002
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                description: Documented response; schema not yet modeled.
  /apis/search/v2:
    get:
      operationId: get_web_v3_apis_search_v2
      summary: Search athletes/teams/events by name
      parameters:
      - name: query
        in: query
        required: true
        schema:
          type: string
        description: Search query string.
      - name: sport
        in: query
        required: false
        schema:
          type: string
        description: Sport slug filter.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                description: Documented response; schema not yet modeled.
components:
  schemas:
    Reference:
      type: object
      description: ESPN `$ref` envelope. Core v2 returns these pointers liberally; follow the URL to fetch
        the inline resource.
      properties:
        $ref:
          type: string
          format: uri
