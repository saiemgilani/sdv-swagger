openapi: 3.1.0
info:
  title: FoxSports Bifrost API (unofficial)
  version: 0.1.0-rev2026.06
  summary: Reverse-engineered OpenAPI spec for Fox Sports' Bifrost content API.
  description: 'api.foxsports.com/bifrost/v1 is a layout-oriented JSON API that powers foxsports.com and
    the Fox Sports apps. Endpoint shapes are uniform across sports; only the {sport} slug differs. Auth
    is a public apikey + api-version query pair. Two key tiers exist: a data tier (bifrost sports data)
    and a feed tier (general/trending, foxpolls, fs). Schemas are inferred from captured representative
    responses (see fox/captures/). NOT an official API.

    '
  x-foxsports-schema-source: captured-2026-06-09
  contact:
    name: sdv-internal-refs
  license:
    name: Reference only
servers:
- url: https://api.foxsports.com
  description: Fox Sports API gateway (Apigee)
- url: https://test.api.foxsports.com
  description: Staging mirror
security:
- dataKey: []
  apiVersion: []
tags:
- name: scoreboard
  description: Scoreboards and score chips
- name: league
  description: 'League hub: scores, standings, polls, odds, stats, team directory'
- name: event
  description: Per-game data, odds, matchup, recap
- name: team
  description: Team roster, stats, gamelog, standings
- name: explore
  description: Browse/favorite discovery hubs
- name: search
  description: Search + typeahead
- name: trending
  description: Trending articles/videos (feed tier)
- name: polls
  description: Fan polls (feed tier)
- name: content
  description: Editorial fs/* service (not reproduced)
paths:
  /bifrost/v1/explore/browse/{section}/main:
    get:
      operationId: get_bifrost_explore_browse
      summary: Browse hub (onboarding/discovery)
      tags:
      - explore
      parameters:
      - $ref: '#/components/parameters/apiVersion'
      - $ref: '#/components/parameters/section'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  title: {}
                  groups: {}
              examples:
                captured:
                  summary: Captured 2026-06-09 (explore_browse_sports_main.json)
                  externalValue: ./captures/_sample/explore_browse_sports_main.json
  /bifrost/v1/explore/favorite/{section}/main:
