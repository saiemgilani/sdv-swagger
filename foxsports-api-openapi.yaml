components:
  securitySchemes:
    dataKey:
      type: apiKey
      in: query
      name: apikey
      description: Bifrost data tier key (e.g. jE7yBJVRNAwdDesMgTzTXUUSx1It41Fq).
    feedKey:
      type: apiKey
      in: query
      name: apikey
      description: Feed tier key (e.g. SuNgfBgmTGS2xozZbnV6FcjGGRQrR8cg) for trending/polls/fs.
    apiVersion:
      type: apiKey
      in: query
      name: api-version
      description: Required version pin (1.1).
  parameters:
    sport:
      name: sport
      in: path
      required: true
      description: Fox sport slug.
      schema:
        type: string
        enum:
        - topevents
        - cfb
        - nfl
        - mlb
        - nba
        - nhl
        - wnba
        - cbk
        - wcbk
        - soccer
        - golf
        - nascar
        - ufc
        - boxing
        - tennis
        - ufl
        - wbc
    apiVersion:
      name: api-version
      in: query
      required: true
      description: Bifrost API version.
      schema:
        type: string
        default: '1.1'
    apiVersionFeed:
      name: api-version
      in: query
      required: false
      description: Optional for feed-tier endpoints.
      schema:
        type: string
        default: '1.1'
    groupIdQuery:
      name: groupId
      in: query
      required: false
      description: Conference/week/group id, or one of top25, bowls, cfp.
      schema:
        type: string
    eventId:
      name: eventId
      in: path
      required: true
      description: Numeric Bifrost event id (not the scorechip id).
      schema:
        type: string
        pattern: ^[0-9]+$
    teamId:
      name: teamId
      in: path
      required: true
      description: Numeric team id (from league/teamnav).
      schema:
        type: string
        pattern: ^[0-9]+$
    chipId:
      name: chipId
      in: path
      required: true
      description: Score-chip id, form {sport}{eventId} e.g. mlb95682.
      schema:
        type: string
    segment:
      name: segment
      in: path
      required: true
      description: 0-based board segment index.
      schema:
        type: integer
    segmentId:
      name: segmentId
      in: path
      required: true
      description: Segment id, e.g. 2025-cfp-2.
      schema:
        type: string
    who:
      name: who
      in: path
      required: true
      schema:
        type: string
        enum:
        - player
        - team
    category:
      name: category
      in: path
      required: true
      schema:
        type: string
        enum:
        - passing
        - rushing
        - receiving
        - defense
        - kicking
        - returning
        - scoring
        - yardage
        - downs
        - turnovers
    page:
      name: page
      in: path
      required: true
      description: 0-based page index.
      schema:
        type: integer
        default: 0
    section:
      name: section
      in: path
      required: true
      schema:
        type: string
        enum:
        - sports
        - players
        - shows
        - personalities
        - topics
    text:
      name: text
      in: query
      required: true
      description: Search term.
      schema:
        type: string
    duration:
      name: duration
      in: query
      required: false
      schema:
        type: integer
        default: 4
    maxItems:
      name: maxItems
      in: query
      required: false
      schema:
        type: integer
        default: 12
    tags:
      name: tags
      in: query
      required: false
      description: Entity tag filter, e.g. league:football/cfb/league/1.
      schema:
        type: string
    associatedEntityIds:
      name: associatedEntityIds
      in: query
      required: true
      description: Entity contentUri, e.g. football/cfb/league/1.
      schema:
        type: string
    includeAnswers:
      name: includeAnswers
      in: query
      required: false
      schema:
        type: boolean
        default: true
